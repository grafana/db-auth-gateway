name: Publish release image

# Triggered by pushing a release tag (v1.2.3). The tag drives the published
# image tags: full version, major.minor, and latest.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: us-docker.pkg.dev/grafanalabs-global/dockerhub-db-auth-gateway-prod-mirror
  IMAGE_NAME: db-auth-gateway

jobs:
  publish:
    name: Build and push release image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for login-to-gar (workload identity)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Authenticate to the registry via OIDC workload identity (no static
      # credentials in CI), the same as the push-to-gar job in ci.yml.
      - name: Login to GAR
        uses: grafana/shared-workflows/actions/login-to-gar@1f541877ceb22c7be7667d8a8df04984aeac9f9d # login-to-gar/v1.0.3

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: cmd/db-auth-gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BRANCH=${{ github.ref_name }}
            REVISION=${{ github.sha }}
